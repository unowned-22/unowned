services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - unowned

  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: unnamed_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d unnamed_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - unowned

  api:
    image: airlance/go:1.26.rc
    container_name: api
    volumes:
      - ./workspace/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      meilisearch:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - unowned

  worker:
    image: airlance/go:1.26.rc
    container_name: worker
    volumes:
      - ./workspace/api:/app
    command: ["sh", "-c", "while [ ! -f ./app ]; do sleep 1; done && ./app worker"]
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    restart: unless-stopped
    networks:
      - unowned

  panel:
    image: airlance/vite-react-vue:24-alpine
    container_name: panel
    volumes:
      - ./workspace/panel:/app
    depends_on:
      - api
    environment:
      PORT: 3222
    restart: unless-stopped
    networks:
      - unowned

  adminer:
    image: adminer
    container_name: adminer
    restart: unless-stopped
    networks:
      - unowned

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: rbmq
      RABBITMQ_DEFAULT_PASS: rbmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - unowned

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: studio-minio
      MINIO_ROOT_PASSWORD: studio-minio
    volumes:
      - ./workspace/storage:/data
    networks:
      - unowned

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: super-secret-key-change-me
      MEILI_ENV: development
    volumes:
      - ./workspace/search:/meili_data
    networks:
      - unowned

  redis:
    image: redis:8-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - unowned

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - 3016:8025
      - 1025:1025
    restart: unless-stopped
    environment:
      MP_SMTP_BIND_ADDR: 0.0.0.0:1025
      MP_UI_BIND_ADDR: 0.0.0.0:8025
      MP_HOSTNAME: mailpit.localhost
    networks:
      - unowned

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  redis_data:
networks:
  unowned:
